<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs - Mission Control</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e7ff;
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .header a {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .header a:hover {
      opacity: 0.7;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #e0e7ff;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn, .search-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e7ff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .filter-btn.active {
      background: rgba(99, 102, 241, 0.3);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .search-input {
      flex: 1;
      min-width: 200px;
    }

    .logs-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    .log-entry {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 20px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .log-entry:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .log-timestamp {
      font-size: 13px;
      color: #94a3b8;
      font-family: 'Courier New', monospace;
    }

    .log-level {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .log-level.error {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .log-level.warn {
      background: rgba(251, 146, 60, 0.2);
      color: #fdba74;
    }

    .log-level.info {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .log-level.debug {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
    }

    .log-source {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: rgba(139, 92, 246, 0.2);
      color: #c4b5fd;
    }

    .log-message {
      font-size: 14px;
      line-height: 1.6;
      color: #e0e7ff;
      margin-bottom: 8px;
    }

    .log-metadata {
      font-size: 12px;
      color: #64748b;
      font-family: 'Courier New', monospace;
      display: none;
    }

    .log-entry.expanded .log-metadata {
      display: block;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .refresh-btn {
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #c4b5fd;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(99, 102, 241, 0.3);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters {
        flex-direction: column;
      }

      .filter-btn, .search-input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html">
      <span style="font-size: 32px;">🚀</span>
      <h1>Mission Control</h1>
    </a>
    <span style="margin-left: auto; color: #64748b;">📜 Logs</span>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="filters">
    <button class="filter-btn active" data-level="all">All</button>
    <button class="filter-btn" data-level="error">Errors</button>
    <button class="filter-btn" data-level="warn">Warnings</button>
    <button class="filter-btn" data-level="info">Info</button>
    <button class="filter-btn" data-level="debug">Debug</button>
    <input type="text" class="search-input" id="searchInput" placeholder="Search logs...">
    <button class="refresh-btn" onclick="loadLogs()">🔄 Refresh</button>
  </div>

  <div class="logs-container" id="logsContainer">
    <div class="loading">Loading logs...</div>
  </div>

  <script>
    let allLogs = [];
    let currentFilter = 'all';
    let searchQuery = '';

    async function loadLogs() {
      try {
        const response = await fetch('logs.json?_=' + Date.now());
        const data = await response.json();
        
        allLogs = data.logs || [];
        
        // Update stats
        updateStats(data);
        
        // Render logs
        renderLogs();
        
      } catch (error) {
        console.error('Error loading logs:', error);
        document.getElementById('logsContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div>Failed to load logs</div>
            <div style="margin-top: 8px; font-size: 12px;">${error.message}</div>
          </div>
        `;
      }
    }

    function updateStats(data) {
      const stats = [
        { label: 'Total Logs', value: data.totalLogs || 0 },
        { label: 'Errors', value: data.levels?.error || 0 },
        { label: 'Warnings', value: data.levels?.warn || 0 },
        { label: 'Agent Logs', value: data.sources?.agents || 0 },
        { label: 'Cron Logs', value: data.sources?.crons || 0 },
        { label: 'System Logs', value: data.sources?.gateway || 0 }
      ];

      document.getElementById('statsGrid').innerHTML = stats.map(stat => `
        <div class="stat-card">
          <div class="stat-label">${stat.label}</div>
          <div class="stat-value">${stat.value}</div>
        </div>
      `).join('');
    }

    function renderLogs() {
      const container = document.getElementById('logsContainer');
      
      // Filter logs
      const filteredLogs = allLogs.filter(log => {
        // Level filter
        if (currentFilter !== 'all' && log.level !== currentFilter) {
          return false;
        }
        
        // Search filter
        if (searchQuery) {
          const query = searchQuery.toLowerCase();
          return (
            log.message.toLowerCase().includes(query) ||
            log.source.toLowerCase().includes(query) ||
            (log.agentId && log.agentId.toLowerCase().includes(query)) ||
            (log.cronId && log.cronId.toLowerCase().includes(query))
          );
        }
        
        return true;
      });

      if (filteredLogs.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div>No logs found</div>
            <div style="margin-top: 8px; font-size: 12px;">
              ${searchQuery ? 'Try a different search query' : 'No logs match the current filters'}
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredLogs.map((log, index) => `
        <div class="log-entry" onclick="toggleLogDetails(${index})">
          <div class="log-header">
            <span class="log-timestamp">${formatTimestamp(log.timestamp)}</span>
            <span class="log-level ${log.level}">${log.level}</span>
            <span class="log-source">${log.source}</span>
            ${log.agentId ? `<span style="font-size: 11px; color: #64748b;">Agent: ${log.agentId}</span>` : ''}
            ${log.cronId ? `<span style="font-size: 11px; color: #64748b;">Cron: ${log.cronId.substring(0, 8)}...</span>` : ''}
          </div>
          <div class="log-message">${escapeHtml(log.message)}</div>
          ${log.metadata ? `
            <div class="log-metadata">
              <pre style="margin: 0; white-space: pre-wrap; word-wrap: break-word;">${JSON.stringify(log.metadata, null, 2)}</pre>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function toggleLogDetails(index) {
      const logs = document.querySelectorAll('.log-entry');
      if (logs[index]) {
        logs[index].classList.toggle('expanded');
      }
    }

    function formatTimestamp(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 1) return 'just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      
      return date.toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.level;
        renderLogs();
      });
    });

    // Search input
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderLogs();
    });

    // Initial load
    loadLogs();

    // Auto-refresh every 30 seconds
    setInterval(loadLogs, 30000);
  </script>
</body>
</html>
