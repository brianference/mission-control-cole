<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agent Command Center - Mission Control</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #FF9500;
  --primary-light: #FFB340;
  --primary-bg: rgba(255, 149, 0, 0.1);
  --accent: #5856D6;
  --success: #34C759;
  --danger: #FF3B30;
  --warning: #FF9500;
  --bg: #000000;
  --surface: #1C1C1E;
  --surface2: #2C2C2E;
  --text: #FFFFFF;
  --text-dim: #98989D;
  --text-muted: #636366;
  --border: #38383A;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  padding-bottom: 100px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.icon {
  font-size: 28px;
}

.header-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.header-right {
  display: flex;
  gap: 12px;
}

.icon-button {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--surface);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
}

.back-link {
  color: var(--accent);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  font-size: 16px;
}

.welcome {
  font-size: 32px;
  font-weight: 700;
  color: #60A5FA;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.subtitle {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 32px;
}

.section {
  background: var(--surface);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  border-left: 4px solid var(--accent);
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.agent-card {
  background: var(--surface2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

.agent-card.warning {
  border-left: 4px solid var(--warning);
}

.agent-card.danger {
  border-left: 4px solid var(--danger);
}

.agent-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 12px;
}

.agent-info {
  flex: 1;
}

.agent-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.agent-id {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'SF Mono', 'Courier New', monospace;
}

.agent-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 500;
}

.agent-status.active {
  background: rgba(52, 199, 89, 0.2);
  color: var(--success);
}

.agent-status.idle {
  background: rgba(255, 149, 0, 0.2);
  color: var(--warning);
}

.agent-status.error {
  background: rgba(255, 59, 48, 0.2);
  color: var(--danger);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.agent-details {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.detail-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.detail-value {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}

.detail-value.warning {
  color: var(--warning);
}

.detail-value.danger {
  color: var(--danger);
}

.agent-task {
  background: var(--bg);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.4;
}

.agent-actions {
  display: flex;
  gap: 8px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: white;
}

.btn-danger {
  background: rgba(255, 59, 48, 0.2);
  color: var(--danger);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.btn:active {
  transform: scale(0.95);
}

.spawn-form {
  background: var(--surface2);
  border-radius: 16px;
  padding: 20px;
  margin-top: 16px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: block;
}

.form-input,
.form-textarea {
  width: 100%;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}

.form-textarea {
  min-height: 80px;
  resize: vertical;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}

.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}

.error {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid #EF4444;
  border-radius: 12px;
  padding: 16px;
  color: #EF4444;
  font-size: 14px;
  margin-bottom: 20px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--surface2);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
}

.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --surface2: #F2F2F7;
    --text: #000000;
    --text-dim: #3C3C43;
    --text-muted: #8E8E93;
    --border: #D1D1D6;
  }
}
</style>
</head>
<body>

<a href="index.html" class="back-link">
  ← Back to Dashboard
</a>

<div class="header">
  <div class="header-left">
    <div class="icon">🤖</div>
    <div class="header-title">Agent Command Center</div>
  </div>
  <div class="header-right">
    <button class="icon-button" id="refreshBtn">🔄</button>
  </div>
</div>

<h1 class="welcome">Active Agents</h1>
<div class="subtitle" id="lastUpdate">Loading...</div>

<div id="errorContainer"></div>

<!-- Summary Statistics -->
<div class="stat-grid">
  <div class="stat-card">
    <div class="stat-value" id="totalAgents">0</div>
    <div class="stat-label">Total Active</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="totalCost">$0.00</div>
    <div class="stat-label">Total Cost</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="burnRate">$0/hr</div>
    <div class="stat-label">Burn Rate</div>
  </div>
</div>

<!-- Spawn New Agent Section -->
<div class="section">
  <div class="section-header">
    <div class="section-title">🚀 Spawn New Agent</div>
    <button class="icon-button" id="toggleSpawnForm">+</button>
  </div>

  <div class="spawn-form" id="spawnForm" style="display: none;">
    <div class="form-group">
      <label class="form-label">Task Description</label>
      <textarea class="form-textarea" id="taskInput" placeholder="Describe the task for the agent..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Model (optional)</label>
      <input type="text" class="form-input" id="modelInput" placeholder="claude-sonnet-4-5">
    </div>
    <button class="btn btn-primary" id="spawnBtn" style="width: 100%;">
      🚀 Spawn Agent
    </button>
  </div>
</div>

<!-- Active Agents List -->
<div class="section">
  <div class="section-header">
    <div class="section-title">📊 Active Sessions</div>
  </div>

  <div id="agentsContainer">
    <div class="loading">Loading agents...</div>
  </div>
</div>

<script>
// Model pricing (cost per 1M tokens)
const MODEL_PRICING = {
  'claude-sonnet-4-5': { input: 3.00, output: 15.00 },
  'claude-opus-4': { input: 15.00, output: 75.00 },
  'google/gemini-2.5-flash': { input: 0.075, output: 0.30 },
  'openai/gpt-4': { input: 30.00, output: 60.00 }
};

let agents = [];
let refreshInterval = null;

// Format duration
function formatDuration(ms) {
  const seconds = Math.floor(ms / 1000);
  const minutes = Math.floor(seconds / 60);
  const hours = Math.floor(minutes / 60);
  
  if (hours > 0) return `${hours}h ${minutes % 60}m`;
  if (minutes > 0) return `${minutes}m ${seconds % 60}s`;
  return `${seconds}s`;
}

// Calculate cost
function calculateCost(agent) {
  const modelKey = agent.model || 'claude-sonnet-4-5';
  const pricing = MODEL_PRICING[modelKey] || MODEL_PRICING['claude-sonnet-4-5'];
  
  const inputCost = (agent.inputTokens || 0) / 1000000 * pricing.input;
  const outputCost = (agent.outputTokens || 0) / 1000000 * pricing.output;
  
  return inputCost + outputCost;
}

// Calculate token burn rate (tokens per hour)
function calculateBurnRate(agent) {
  if (!agent.ageMs || agent.ageMs === 0) return 0;
  
  const hoursActive = agent.ageMs / (1000 * 60 * 60);
  const tokensPerHour = agent.totalTokens / hoursActive;
  
  const modelKey = agent.model || 'claude-sonnet-4-5';
  const pricing = MODEL_PRICING[modelKey] || MODEL_PRICING['claude-sonnet-4-5'];
  
  // Assume 70% input, 30% output for burn rate estimate
  const avgPricePerMToken = (pricing.input * 0.7) + (pricing.output * 0.3);
  const costPerHour = (tokensPerHour / 1000000) * avgPricePerMToken;
  
  return costPerHour;
}

// Get context usage percentage
function getContextUsage(agent) {
  if (!agent.contextTokens) return 0;
  return (agent.totalTokens / agent.contextTokens) * 100;
}

// Get agent status
function getAgentStatus(agent) {
  const contextUsage = getContextUsage(agent);
  const burnRate = calculateBurnRate(agent);
  
  if (contextUsage > 90 || burnRate > 5) return 'error';
  if (contextUsage > 80 || burnRate > 2) return 'warning';
  if (agent.ageMs < 60000) return 'active'; // Active if updated in last minute
  return 'idle';
}

// Fetch agents from OpenClaw - REAL DATA ONLY
async function fetchAgents() {
  try {
    // Fetch from static JSON generated at build time by gen-sessions.js
    const response = await fetch('/active-sessions.json');
    if (!response.ok) throw new Error(`Failed to load agents: ${response.status}`);
    
    const data = await response.json();
    
    // Transform active-sessions.json format to agents format
    agents = (data.sessions || []).map(session => ({
      key: `agent:${session.agentId}:${session.sessionKey}`,
      sessionId: session.sessionKey,
      model: session.model || 'unknown',
      modelProvider: session.model?.includes('anthropic') ? 'anthropic' : 
                     session.model?.includes('google') ? 'google' : 'unknown',
      inputTokens: Math.floor(session.totalTokens * 0.7),  // Estimate based on typical ratio
      outputTokens: Math.floor(session.totalTokens * 0.3),
      totalTokens: session.totalTokens || 0,
      contextTokens: 200000,  // Default context window
      ageMs: Date.now() - session.updatedAt,
      agentId: session.agentId,
      kind: session.status === 'running' ? 'direct' : 'cron',
      displayName: session.displayName || session.agentId,
      messageCount: session.messageCount || 0
    }));
    
    updateDisplay();
    updateStats();
    clearError();
  } catch (error) {
    console.error('Failed to fetch agents:', error);
    agents = [];
    updateDisplay();
    updateStats();
    showError(`Unable to load agent data: ${error.message}. Ensure gen-sessions.js runs at build time.`);
  }
}

// Update summary stats
function updateStats() {
  const totalCost = agents.reduce((sum, agent) => sum + calculateCost(agent), 0);
  const avgBurnRate = agents.length > 0
    ? agents.reduce((sum, agent) => sum + calculateBurnRate(agent), 0) / agents.length
    : 0;
  
  document.getElementById('totalAgents').textContent = agents.length;
  document.getElementById('totalCost').textContent = `$${totalCost.toFixed(2)}`;
  document.getElementById('burnRate').textContent = `$${avgBurnRate.toFixed(2)}/hr`;
  
  document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
}

// Render agent cards
function updateDisplay() {
  const container = document.getElementById('agentsContainer');
  
  if (agents.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🤖</div>
        <div>No active agents</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = agents.map(agent => {
    const status = getAgentStatus(agent);
    const cost = calculateCost(agent);
    const burnRate = calculateBurnRate(agent);
    const contextUsage = getContextUsage(agent);
    
    const statusClass = status === 'error' ? 'danger' : status === 'warning' ? 'warning' : '';
    const costColor = cost > 2 ? 'danger' : cost > 1 ? 'warning' : '';
    const contextColor = contextUsage > 80 ? 'danger' : contextUsage > 70 ? 'warning' : '';
    
    return `
      <div class="agent-card ${statusClass}">
        <div class="agent-header">
          <div class="agent-info">
            <div class="agent-name">${agent.key.split(':').slice(-1)[0] || 'Agent'}</div>
            <div class="agent-id">${agent.sessionId.substring(0, 8)}...</div>
          </div>
          <div class="agent-status ${status}">
            <span class="status-dot"></span>
            ${status.toUpperCase()}
          </div>
        </div>
        
        <div class="agent-details">
          <div class="detail-item">
            <div class="detail-label">Runtime</div>
            <div class="detail-value">${formatDuration(agent.ageMs)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Model</div>
            <div class="detail-value">${agent.model || 'Unknown'}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Tokens</div>
            <div class="detail-value">${agent.totalTokens.toLocaleString()}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Context Usage</div>
            <div class="detail-value ${contextColor}">${contextUsage.toFixed(1)}%</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Cost</div>
            <div class="detail-value ${costColor}">$${cost.toFixed(3)}</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Burn Rate</div>
            <div class="detail-value ${burnRate > 1 ? 'warning' : ''}">$${burnRate.toFixed(2)}/hr</div>
          </div>
        </div>
        
        ${contextUsage > 80 || burnRate > 2 ? `
          <div class="agent-task">
            ⚠️ ${contextUsage > 80 ? 'Context window approaching limit. ' : ''}
            ${burnRate > 2 ? `High token burn rate detected ($${burnRate.toFixed(2)}/hr). ` : ''}
            Consider optimizing or killing this agent.
          </div>
        ` : ''}
        
        <div class="agent-actions">
          <button class="btn btn-secondary" onclick="viewLogs('${agent.sessionId}')">
            📜 Logs
          </button>
          <button class="btn btn-danger" onclick="killAgent('${agent.sessionId}')">
            ⛔ Kill
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// View agent logs
function viewLogs(sessionId) {
  alert(`View logs for session ${sessionId}\n\nFeature coming soon: Full transcript and execution history`);
  // TODO: Implement log viewing
  // Could open modal with openclaw sessions history output
}

// Kill agent
async function killAgent(sessionId) {
  if (!confirm('Are you sure you want to kill this agent?')) return;
  
  try {
    // TODO: Implement via API endpoint that calls:
    // openclaw subagents kill <sessionId>
    alert(`Kill agent ${sessionId}\n\nFeature requires backend API endpoint`);
    // await fetch(`/api/agents/${sessionId}/kill`, { method: 'POST' });
    // fetchAgents(); // Refresh
  } catch (error) {
    alert('Failed to kill agent: ' + error.message);
  }
}

// Spawn new agent
async function spawnAgent() {
  const task = document.getElementById('taskInput').value.trim();
  const model = document.getElementById('modelInput').value.trim();
  
  if (!task) {
    alert('Please enter a task description');
    return;
  }
  
  try {
    // TODO: Implement via API endpoint that calls:
    // openclaw sessions spawn --task="..." --model="..."
    alert(`Spawn agent with task: ${task}\n${model ? `Model: ${model}` : ''}\n\nFeature requires backend API endpoint`);
    
    // Clear form
    document.getElementById('taskInput').value = '';
    document.getElementById('modelInput').value = '';
    document.getElementById('spawnForm').style.display = 'none';
    
    // Refresh agents
    // await fetchAgents();
  } catch (error) {
    alert('Failed to spawn agent: ' + error.message);
  }
}

function showError(message) {
  const errorContainer = document.getElementById('errorContainer');
  errorContainer.innerHTML = `<div class="error">${message}</div>`;
}

function clearError() {
  document.getElementById('errorContainer').innerHTML = '';
}

// Toggle spawn form
document.getElementById('toggleSpawnForm').addEventListener('click', () => {
  const form = document.getElementById('spawnForm');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
});

// Spawn button
document.getElementById('spawnBtn').addEventListener('click', spawnAgent);

// Refresh button
document.getElementById('refreshBtn').addEventListener('click', () => {
  fetchAgents();
});

// Initialize
fetchAgents();

// Auto-refresh every 10 seconds
refreshInterval = setInterval(fetchAgents, 10000);

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (refreshInterval) clearInterval(refreshInterval);
});
</script>

</body>
</html>
