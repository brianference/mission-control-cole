<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentation - Mission Control</title>
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #FF9500;
  --bg: #000000;
  --surface: #1C1C1E;
  --surface2: #2C2C2E;
  --text: #FFFFFF;
  --text-dim: #98989D;
  --border: #38383A;
  --success: #34C759;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.header-left h1 {
  font-size: 28px;
  font-weight: 600;
}

.header-left a {
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  margin-right: 12px;
}

.search-bar {
  width: 100%;
  max-width: 600px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 16px;
  margin-bottom: 20px;
}

.search-bar:focus {
  outline: none;
  border-color: var(--primary);
}

.filters {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}

.filter-btn.active {
  background: var(--primary);
  color: #000;
  border-color: var(--primary);
}

.filter-btn:hover {
  border-color: var(--primary);
}

.stats {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  min-width: 150px;
}

.stat-card .label {
  color: var(--text-dim);
  font-size: 13px;
  margin-bottom: 8px;
}

.stat-card .value {
  font-size: 24px;
  font-weight: 600;
}

.docs-list {
  display: grid;
  gap: 16px;
}

.doc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.doc-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
}

.doc-card .doc-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.doc-card .doc-title {
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.doc-card .doc-category {
  background: var(--surface2);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.doc-card .doc-description {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.5;
}

.doc-card .doc-meta {
  display: flex;
  gap: 16px;
  font-size: 13px;
  color: var(--text-dim);
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state .icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 1000;
  overflow-y: auto;
  padding: 40px 20px;
}

.modal.active {
  display: block;
}

.modal-content {
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 30px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.modal-header h2 {
  font-size: 24px;
}

.close-btn {
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  padding: 8px;
}

.close-btn:hover {
  color: var(--primary);
}

.doc-content {
  line-height: 1.8;
  font-size: 15px;
}

.doc-content h1 {
  font-size: 28px;
  margin: 30px 0 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.doc-content h2 {
  font-size: 22px;
  margin: 24px 0 12px;
}

.doc-content h3 {
  font-size: 18px;
  margin: 20px 0 10px;
}

.doc-content p {
  margin-bottom: 12px;
}

.doc-content code {
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "SF Mono", monospace;
  font-size: 14px;
}

.doc-content pre {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 16px 0;
}

.doc-content pre code {
  background: none;
  padding: 0;
}

.doc-content ul, .doc-content ol {
  margin-left: 24px;
  margin-bottom: 12px;
}

.doc-content li {
  margin-bottom: 6px;
}

.doc-content a {
  color: var(--primary);
  text-decoration: none;
}

.doc-content a:hover {
  text-decoration: underline;
}

.doc-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
}

.doc-content th, .doc-content td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}

.doc-content th {
  background: var(--surface2);
  font-weight: 600;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html">← Mission Control</a>
    <h1>📚 Documentation</h1>
  </div>
</div>

<input type="text" class="search-bar" id="searchInput" placeholder="Search documentation..." autocomplete="off">

<div class="filters">
  <button class="filter-btn active" data-category="all">All</button>
  <button class="filter-btn" data-category="core">Core</button>
  <button class="filter-btn" data-category="workspace">Workspace</button>
  <button class="filter-btn" data-category="skills">Skills</button>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="label">Total Documents</div>
    <div class="value" id="totalDocs">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Total Words</div>
    <div class="value" id="totalWords">-</div>
  </div>
  <div class="stat-card">
    <div class="label">Total Size</div>
    <div class="value" id="totalSize">-</div>
  </div>
</div>

<div id="loadingState" class="loading">
  Loading documentation...
</div>

<div id="emptyState" class="empty-state" style="display: none;">
  <div class="icon">📭</div>
  <p>No documentation found</p>
  <p style="margin-top: 8px; font-size: 14px;">Run <code>node api/gen-docs.js</code> to generate documentation data.</p>
</div>

<div id="docsList" class="docs-list"></div>

<!-- Modal -->
<div id="docModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalContent" class="doc-content"></div>
  </div>
</div>

<script>
let allDocs = [];
let filteredDocs = [];
let currentCategory = 'all';

// Configure marked for syntax highlighting
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try {
        return hljs.highlight(code, { language: lang }).value;
      } catch (e) {}
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

// Load documentation data
async function loadDocs() {
  try {
    const response = await fetch('docs.json');
    if (!response.ok) {
      throw new Error('Failed to load docs.json');
    }
    
    const data = await response.json();
    allDocs = data.docs;
    filteredDocs = allDocs;
    
    // Update stats
    document.getElementById('totalDocs').textContent = data.totalDocs.toLocaleString();
    document.getElementById('totalWords').textContent = data.totalWords.toLocaleString();
    document.getElementById('totalSize').textContent = (data.totalSize / 1024).toFixed(1) + 'KB';
    
    // Hide loading, show list
    document.getElementById('loadingState').style.display = 'none';
    renderDocs();
    
  } catch (error) {
    console.error('Error loading docs:', error);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  }
}

// Render documentation list
function renderDocs() {
  const docsList = document.getElementById('docsList');
  
  if (filteredDocs.length === 0) {
    document.getElementById('emptyState').style.display = 'block';
    docsList.innerHTML = '';
    return;
  }
  
  document.getElementById('emptyState').style.display = 'none';
  
  docsList.innerHTML = filteredDocs.map(doc => `
    <div class="doc-card" onclick="openDoc('${escapeHtml(doc.path)}')">
      <div class="doc-header">
        <div class="doc-title">
          <span>${doc.icon}</span>
          <span>${escapeHtml(doc.title)}</span>
        </div>
        <div class="doc-category">${doc.category}</div>
      </div>
      <div class="doc-description">${escapeHtml(doc.description || 'No description')}</div>
      <div class="doc-meta">
        <span>${doc.wordCount.toLocaleString()} words</span>
        <span>${(doc.size / 1024).toFixed(1)}KB</span>
        <span>Modified: ${new Date(doc.modified).toLocaleDateString()}</span>
      </div>
    </div>
  `).join('');
}

// Search functionality
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  
  if (!query) {
    filteredDocs = allDocs.filter(doc => currentCategory === 'all' || doc.category === currentCategory);
  } else {
    filteredDocs = allDocs.filter(doc => {
      const matchesCategory = currentCategory === 'all' || doc.category === currentCategory;
      const matchesQuery = doc.title.toLowerCase().includes(query) ||
                          doc.description.toLowerCase().includes(query) ||
                          doc.content.toLowerCase().includes(query);
      return matchesCategory && matchesQuery;
    });
  }
  
  renderDocs();
});

// Category filtering
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    // Update active state
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // Filter docs
    currentCategory = btn.dataset.category;
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    if (currentCategory === 'all') {
      filteredDocs = allDocs;
    } else {
      filteredDocs = allDocs.filter(doc => doc.category === currentCategory);
    }
    
    // Apply search if present
    if (query) {
      filteredDocs = filteredDocs.filter(doc =>
        doc.title.toLowerCase().includes(query) ||
        doc.description.toLowerCase().includes(query) ||
        doc.content.toLowerCase().includes(query)
      );
    }
    
    renderDocs();
  });
});

// Open document in modal
function openDoc(docPath) {
  const doc = allDocs.find(d => d.path === docPath);
  if (!doc) return;
  
  document.getElementById('modalTitle').textContent = doc.title;
  
  // Render markdown with syntax highlighting
  const rawHtml = marked.parse(doc.content);
  const cleanHtml = DOMPurify.sanitize(rawHtml);
  document.getElementById('modalContent').innerHTML = cleanHtml;
  
  // Apply syntax highlighting to code blocks
  document.querySelectorAll('#modalContent pre code').forEach(block => {
    hljs.highlightElement(block);
  });
  
  document.getElementById('docModal').classList.add('active');
  document.body.style.overflow = 'hidden';
}

// Close modal
function closeModal() {
  document.getElementById('docModal').classList.remove('active');
  document.body.style.overflow = 'auto';
}

// Close modal on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
  }
});

// Close modal on background click
document.getElementById('docModal').addEventListener('click', (e) => {
  if (e.target.id === 'docModal') {
    closeModal();
  }
});

// Utility function
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Initialize
loadDocs();
</script>

</body>
</html>
